<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <rect width="800" height="500" rx="12" fill="#f8f9fa"/>
  <!-- Calendar header -->
  <rect y="0" width="800" height="52" rx="12" fill="#fff"/>
  <rect y="12" width="800" height="40" fill="#fff"/>
  <rect x="16" y="14" width="24" height="24" rx="4" fill="#4285f4"/>
  <text x="22" y="30" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#fff">31</text>
  <text x="48" y="32" font-family="system-ui,sans-serif" font-size="16" font-weight="500" fill="#3c4043">2026년 3월</text>
  <!-- Mini sidebar -->
  <rect x="0" y="52" width="180" height="448" fill="#fff"/>
  <line x1="180" y1="52" x2="180" y2="500" stroke="#e0e0e0"/>
  <!-- Mini calendar -->
  <text x="20" y="80" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#3c4043">2026년 3월</text>
  <text x="20" y="100" font-family="system-ui,sans-serif" font-size="9" fill="#70757a">일  월  화  수  목  금  토</text>
  <text x="20" y="116" font-family="system-ui,sans-serif" font-size="9" fill="#70757a">                          1</text>
  <text x="20" y="130" font-family="system-ui,sans-serif" font-size="9" fill="#3c4043"> 2   3   4   5   6   7   8</text>
  <text x="20" y="144" font-family="system-ui,sans-serif" font-size="9" fill="#3c4043"> 9  10  11  12  13  14  15</text>
  <!-- Other calendars -->
  <text x="20" y="200" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#3c4043">다른 캘린더</text>
  <rect x="20" y="212" width="10" height="10" rx="2" fill="#7b61ff"/>
  <text x="36" y="222" font-family="system-ui,sans-serif" font-size="11" fill="#3c4043">팀 캘린더</text>
  <rect x="20" y="232" width="10" height="10" rx="2" fill="#0f9d58"/>
  <text x="36" y="242" font-family="system-ui,sans-serif" font-size="11" fill="#3c4043">휴가</text>
  <rect x="20" y="252" width="10" height="10" rx="2" fill="#ea4335"/>
  <text x="36" y="262" font-family="system-ui,sans-serif" font-size="11" fill="#3c4043">마감일</text>
  <!-- Calendar grid -->
  <rect x="180" y="52" width="620" height="448" fill="#fff"/>
  <!-- Time labels -->
  <text x="192" y="90" font-family="system-ui,sans-serif" font-size="10" fill="#70757a">09:00</text>
  <line x1="230" y1="84" x2="780" y2="84" stroke="#e0e0e0" stroke-width="0.5"/>
  <text x="192" y="140" font-family="system-ui,sans-serif" font-size="10" fill="#70757a">10:00</text>
  <line x1="230" y1="134" x2="780" y2="134" stroke="#e0e0e0" stroke-width="0.5"/>
  <text x="192" y="190" font-family="system-ui,sans-serif" font-size="10" fill="#70757a">11:00</text>
  <line x1="230" y1="184" x2="780" y2="184" stroke="#e0e0e0" stroke-width="0.5"/>
  <text x="192" y="240" font-family="system-ui,sans-serif" font-size="10" fill="#70757a">12:00</text>
  <line x1="230" y1="234" x2="780" y2="234" stroke="#e0e0e0" stroke-width="0.5"/>
  <text x="192" y="290" font-family="system-ui,sans-serif" font-size="10" fill="#70757a">13:00</text>
  <line x1="230" y1="284" x2="780" y2="284" stroke="#e0e0e0" stroke-width="0.5"/>
  <text x="192" y="340" font-family="system-ui,sans-serif" font-size="10" fill="#70757a">14:00</text>
  <line x1="230" y1="334" x2="780" y2="334" stroke="#e0e0e0" stroke-width="0.5"/>
  <!-- Day columns -->
  <text x="290" y="74" font-family="system-ui,sans-serif" font-size="11" fill="#70757a" text-anchor="middle">월 30</text>
  <text x="400" y="74" font-family="system-ui,sans-serif" font-size="11" fill="#70757a" text-anchor="middle">화 31</text>
  <text x="510" y="74" font-family="system-ui,sans-serif" font-size="11" fill="#70757a" text-anchor="middle">수 1</text>
  <text x="620" y="74" font-family="system-ui,sans-serif" font-size="11" fill="#70757a" text-anchor="middle">목 2</text>
  <text x="730" y="74" font-family="system-ui,sans-serif" font-size="11" fill="#70757a" text-anchor="middle">금 3</text>
  <line x1="345" y1="60" x2="345" y2="500" stroke="#e0e0e0" stroke-width="0.5"/>
  <line x1="455" y1="60" x2="455" y2="500" stroke="#e0e0e0" stroke-width="0.5"/>
  <line x1="565" y1="60" x2="565" y2="500" stroke="#e0e0e0" stroke-width="0.5"/>
  <line x1="675" y1="60" x2="675" y2="500" stroke="#e0e0e0" stroke-width="0.5"/>
  <!-- Events -->
  <rect x="240" y="84" width="100" height="46" rx="4" fill="#7b61ff" opacity="0.85"/>
  <text x="248" y="100" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#fff">팀 미팅</text>
  <text x="248" y="114" font-family="system-ui,sans-serif" font-size="9" fill="#fff" opacity="0.8">9:00-10:00</text>
  <!-- Focus block -->
  <rect x="240" y="184" width="100" height="96" rx="4" fill="#1a73e8" opacity="0.15" stroke="#1a73e8" stroke-width="1" stroke-dasharray="4"/>
  <text x="248" y="202" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#1a73e8">집중 업무</text>
  <text x="248" y="216" font-family="system-ui,sans-serif" font-size="9" fill="#1a73e8" opacity="0.7">11:00-13:00</text>

  <rect x="350" y="134" width="100" height="46" rx="4" fill="#0f9d58" opacity="0.85"/>
  <text x="358" y="150" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#fff">1:1 미팅</text>
  <text x="358" y="164" font-family="system-ui,sans-serif" font-size="9" fill="#fff" opacity="0.8">10:00-11:00</text>

  <rect x="460" y="84" width="100" height="96" rx="4" fill="#ea4335" opacity="0.85"/>
  <text x="468" y="100" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#fff">워크숍</text>
  <text x="468" y="114" font-family="system-ui,sans-serif" font-size="9" fill="#fff" opacity="0.8">9:00-11:00</text>

  <rect x="680" y="284" width="100" height="46" rx="4" fill="#fbbc04" opacity="0.85"/>
  <text x="688" y="300" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#fff">주간 회고</text>
  <text x="688" y="314" font-family="system-ui,sans-serif" font-size="9" fill="#fff" opacity="0.8">13:00-14:00</text>
</svg>
