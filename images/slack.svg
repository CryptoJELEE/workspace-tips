<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <rect width="800" height="500" rx="12" fill="#1a1d21"/>
  <!-- Slack sidebar -->
  <rect x="0" y="0" width="220" height="500" rx="12" fill="#19171d"/>
  <rect x="12" y="0" width="208" height="500" fill="#19171d"/>
  <!-- Workspace name -->
  <text x="20" y="32" font-family="system-ui,sans-serif" font-size="15" font-weight="700" fill="#fff">광동제약</text>
  <line x1="0" y1="48" x2="220" y2="48" stroke="#35373b" stroke-width="0.5"/>
  <!-- Channels section -->
  <text x="20" y="76" font-family="system-ui,sans-serif" font-size="12" fill="#9b9d9f">채널</text>
  <text x="20" y="100" font-family="system-ui,sans-serif" font-size="13" fill="#d1d2d3"># general</text>
  <text x="20" y="124" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#fff"># ai-센터</text>
  <rect x="190" y="114" width="18" height="16" rx="8" fill="#e01e5a"/>
  <text x="199" y="126" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#fff" text-anchor="middle">3</text>
  <text x="20" y="148" font-family="system-ui,sans-serif" font-size="13" fill="#d1d2d3"># dev-ops</text>
  <text x="20" y="172" font-family="system-ui,sans-serif" font-size="13" fill="#d1d2d3"># 프로젝트-X</text>
  <!-- DMs section -->
  <text x="20" y="210" font-family="system-ui,sans-serif" font-size="12" fill="#9b9d9f">다이렉트 메시지</text>
  <circle cx="30" cy="230" r="6" fill="#2bac76"/>
  <text x="44" y="234" font-family="system-ui,sans-serif" font-size="13" fill="#d1d2d3">김민수</text>
  <circle cx="30" cy="254" r="6" fill="#9b9d9f"/>
  <text x="44" y="258" font-family="system-ui,sans-serif" font-size="13" fill="#d1d2d3">이지은</text>

  <!-- Main chat area -->
  <rect x="220" y="0" width="580" height="500" rx="0" fill="#1a1d21"/>
  <!-- Channel header -->
  <rect x="220" y="0" width="580" height="48" fill="#1a1d21"/>
  <text x="240" y="30" font-family="system-ui,sans-serif" font-size="15" font-weight="700" fill="#d1d2d3"># ai-센터</text>
  <line x1="220" y1="48" x2="800" y2="48" stroke="#35373b" stroke-width="0.5"/>

  <!-- Messages -->
  <!-- Message 1 -->
  <circle cx="252" cy="86" r="16" fill="#e01e5a" opacity="0.3"/>
  <text x="252" y="91" font-family="system-ui,sans-serif" font-size="11" fill="#e01e5a" text-anchor="middle">김</text>
  <text x="280" y="78" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#d1d2d3">김민수</text>
  <text x="340" y="78" font-family="system-ui,sans-serif" font-size="11" fill="#9b9d9f">오전 9:15</text>
  <text x="280" y="98" font-family="system-ui,sans-serif" font-size="13" fill="#d1d2d3">이번 주 스프린트 리뷰 일정 공유드립니다</text>
  <!-- Thread reply indicator -->
  <rect x="280" y="110" width="200" height="24" rx="4" fill="#222529"/>
  <text x="292" y="126" font-family="system-ui,sans-serif" font-size="11" fill="#1d9bd1">3개의 답글</text>

  <!-- Message 2 -->
  <circle cx="252" cy="168" r="16" fill="#2bac76" opacity="0.3"/>
  <text x="252" y="173" font-family="system-ui,sans-serif" font-size="11" fill="#2bac76" text-anchor="middle">이</text>
  <text x="280" y="160" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#d1d2d3">이지은</text>
  <text x="333" y="160" font-family="system-ui,sans-serif" font-size="11" fill="#9b9d9f">오전 9:32</text>
  <text x="280" y="180" font-family="system-ui,sans-serif" font-size="13" fill="#d1d2d3">@김민수 확인했습니다! 자료 미리 준비해둘게요 👍</text>

  <!-- Message 3 - reminder -->
  <circle cx="252" cy="234" r="16" fill="#e8912d" opacity="0.3"/>
  <text x="252" y="239" font-family="system-ui,sans-serif" font-size="11" fill="#e8912d" text-anchor="middle">봇</text>
  <text x="280" y="226" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#d1d2d3">Slackbot</text>
  <text x="348" y="226" font-family="system-ui,sans-serif" font-size="11" fill="#9b9d9f">오전 9:00</text>
  <rect x="280" y="238" width="400" height="56" rx="4" fill="#222529" stroke="#35373b" stroke-width="0.5"/>
  <text x="292" y="258" font-family="system-ui,sans-serif" font-size="12" fill="#e8912d">리마인더</text>
  <text x="292" y="280" font-family="system-ui,sans-serif" font-size="12" fill="#d1d2d3">매주 월요일: 주간 업무 보고서 제출</text>

  <!-- Bookmark bar -->
  <rect x="220" y="320" width="580" height="32" fill="#222529"/>
  <text x="240" y="340" font-family="system-ui,sans-serif" font-size="11" fill="#9b9d9f">📌 북마크:</text>
  <text x="310" y="340" font-family="system-ui,sans-serif" font-size="11" fill="#1d9bd1">팀 위키</text>
  <text x="368" y="340" font-family="system-ui,sans-serif" font-size="11" fill="#1d9bd1">온보딩 가이드</text>
  <text x="464" y="340" font-family="system-ui,sans-serif" font-size="11" fill="#1d9bd1">프로세스 문서</text>

  <!-- Message input -->
  <rect x="236" y="440" width="548" height="44" rx="8" fill="#222529" stroke="#565856" stroke-width="1"/>
  <text x="256" y="466" font-family="system-ui,sans-serif" font-size="13" fill="#9b9d9f">#ai-센터에 메시지 보내기</text>
  <!-- Toolbar icons in input -->
  <rect x="700" y="452" width="24" height="24" rx="4" fill="#35373b"/>
  <text x="712" y="468" font-family="system-ui,sans-serif" font-size="13" fill="#9b9d9f" text-anchor="middle">+</text>
  <rect x="730" y="452" width="40" height="24" rx="4" fill="#007a5a"/>
  <text x="750" y="468" font-family="system-ui,sans-serif" font-size="11" fill="#fff" text-anchor="middle">전송</text>
</svg>
