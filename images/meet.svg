<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <rect width="800" height="500" rx="12" fill="#202124"/>
  <!-- Video grid - 2x2 -->
  <!-- Person 1 (main) -->
  <rect x="20" y="20" width="375" height="300" rx="12" fill="#3c4043"/>
  <circle cx="207" cy="140" r="50" fill="#5f6368"/>
  <circle cx="207" cy="120" r="24" fill="#9aa0a6"/>
  <path d="M207 148 c-30 0-50 20-50 40 v8 h100 v-8 c0-20-20-40-50-40z" fill="#9aa0a6"/>
  <text x="207" y="330" font-family="system-ui,sans-serif" font-size="13" fill="#e8eaed" text-anchor="middle">김민수</text>
  <rect x="30" y="30" width="8" height="8" rx="4" fill="#34a853"/>

  <!-- Person 2 -->
  <rect x="405" y="20" width="375" height="300" rx="12" fill="#3c4043"/>
  <circle cx="592" cy="140" r="50" fill="#5f6368"/>
  <circle cx="592" cy="120" r="24" fill="#9aa0a6"/>
  <path d="M592 148 c-30 0-50 20-50 40 v8 h100 v-8 c0-20-20-40-50-40z" fill="#9aa0a6"/>
  <text x="592" y="330" font-family="system-ui,sans-serif" font-size="13" fill="#e8eaed" text-anchor="middle">이지은</text>

  <!-- Person 3 (smaller) -->
  <rect x="20" y="330" width="180" height="130" rx="10" fill="#3c4043"/>
  <circle cx="110" cy="380" r="24" fill="#5f6368"/>
  <circle cx="110" cy="370" r="12" fill="#9aa0a6"/>
  <path d="M110 384 c-14 0-24 10-24 20 v4 h48 v-4 c0-10-10-20-24-20z" fill="#9aa0a6"/>
  <text x="110" y="448" font-family="system-ui,sans-serif" font-size="10" fill="#e8eaed" text-anchor="middle">박서준</text>

  <!-- Person 4 -->
  <rect x="210" y="330" width="180" height="130" rx="10" fill="#3c4043"/>
  <circle cx="300" cy="380" r="24" fill="#5f6368"/>
  <circle cx="300" cy="370" r="12" fill="#9aa0a6"/>
  <path d="M300 384 c-14 0-24 10-24 20 v4 h48 v-4 c0-10-10-20-24-20z" fill="#9aa0a6"/>
  <text x="300" y="448" font-family="system-ui,sans-serif" font-size="10" fill="#e8eaed" text-anchor="middle">최유진</text>

  <!-- Captions area -->
  <rect x="410" y="330" width="370" height="130" rx="10" fill="#282a2d"/>
  <text x="425" y="365" font-family="system-ui,sans-serif" font-size="12" fill="#9aa0a6">실시간 자막</text>
  <rect x="425" y="378" width="280" height="12" rx="3" fill="#3c4043"/>
  <text x="425" y="388" font-family="system-ui,sans-serif" font-size="10" fill="#e8eaed">다음 분기 계획에 대해 논의하겠습니다</text>
  <rect x="425" y="400" width="220" height="12" rx="3" fill="#3c4043"/>
  <text x="425" y="410" font-family="system-ui,sans-serif" font-size="10" fill="#bdc1c6">우선순위를 먼저 정리하면 좋겠습니다</text>

  <!-- Bottom toolbar -->
  <rect x="200" y="468" width="400" height="28" rx="14" fill="#3c4043"/>
  <!-- Mic -->
  <circle cx="290" cy="482" r="11" fill="#ea4335"/>
  <rect x="287" y="475" width="6" height="8" rx="3" fill="#fff"/>
  <path d="M285 482 h10" stroke="#fff" stroke-width="1.5"/>
  <!-- Camera -->
  <circle cx="330" cy="482" r="11" fill="transparent" stroke="#8ab4f8" stroke-width="1.5"/>
  <rect x="324" y="478" width="8" height="6" rx="1" fill="#8ab4f8"/>
  <path d="M332 479 l4-2 v8 l-4-2z" fill="#8ab4f8"/>
  <!-- Screen share -->
  <circle cx="370" cy="482" r="11" fill="transparent" stroke="#8ab4f8" stroke-width="1.5"/>
  <rect x="364" y="477" width="10" height="7" rx="1" fill="none" stroke="#8ab4f8" stroke-width="1.2"/>
  <path d="M369 484 v3" stroke="#8ab4f8" stroke-width="1.2"/>
  <!-- Hand raise -->
  <circle cx="410" cy="482" r="11" fill="transparent" stroke="#8ab4f8" stroke-width="1.5"/>
  <text x="410" y="487" font-family="system-ui,sans-serif" font-size="12" fill="#8ab4f8" text-anchor="middle">✋</text>
  <!-- Leave -->
  <circle cx="500" cy="482" r="11" fill="#ea4335"/>
  <rect x="494" y="480" width="12" height="4" rx="2" fill="#fff"/>
</svg>
