<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <rect width="800" height="500" rx="12" fill="#f8f9fa"/>
  <!-- Gmail header -->
  <rect y="0" width="800" height="56" rx="12" fill="#fff"/>
  <rect y="12" width="800" height="44" fill="#fff"/>
  <rect x="20" y="16" width="28" height="24" rx="4" fill="#ea4335"/>
  <text x="56" y="34" font-family="system-ui,sans-serif" font-size="16" font-weight="700" fill="#ea4335">Gmail</text>
  <!-- Search bar -->
  <rect x="160" y="12" width="480" height="32" rx="8" fill="#f1f3f4"/>
  <text x="180" y="33" font-family="system-ui,sans-serif" font-size="13" fill="#5f6368">메일 검색</text>
  <!-- Sidebar -->
